name: validate-pr-metadata

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  regression-coverage:
    name: regression-coverage
    runs-on: ubuntu-latest

    steps:
      - name: Validate regression coverage metadata for bug-fix PRs
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const title = context.payload.pull_request.title || '';

            const isChecked = (label) =>
              new RegExp(`- \\[(x|X)\\] ${label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}`).test(body);

            const readField = (label) => {
              const pattern = new RegExp(`^- ${label}:\\s*(.*)$`, 'mi');
              const match = body.match(pattern);
              return (match?.[1] || '').trim();
            };

            const isMeaningfulValue = (value) => {
              const normalized = value.trim().toLowerCase();
              return normalized.length > 0 && !['n/a', 'na', 'none', 'tbd', 'todo', ''].includes(normalized);
            };

            if (!isChecked('Bug fix')) {
              core.info(`PR "${title}" is not marked as a bug fix. Regression coverage metadata gate skipped.`);
              return;
            }

            const coveragePath = readField('Coverage path');
            const coverageType = readField('Coverage type');
            const problems = [];

            if (!isMeaningfulValue(coveragePath)) {
              problems.push('`Coverage path` must point to the regression fixture or test added for this bug fix.');
            }

            if (!isMeaningfulValue(coverageType)) {
              problems.push('`Coverage type` must describe the regression asset, for example shared parity fixture, unit test, browser test, or ported upstream regression test.');
            }

            if (problems.length > 0) {
              core.setFailed(
                [
                  'Bug-fix PRs must document a durable regression asset in the `Regression Coverage` section.',
                  ...problems
                ].join('\n')
              );
              return;
            }

            core.info(
              `Validated regression coverage metadata for bug-fix PR "${title}": ${coverageType} at ${coveragePath}`
            );
